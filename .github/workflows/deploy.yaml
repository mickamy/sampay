name: Deploy

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ needs.resolve-env.outputs.environment }}

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      ecr_backend_url: ${{ steps.meta.outputs.ecr_backend_url }}
      ecr_frontend_url: ${{ steps.meta.outputs.ecr_frontend_url }}

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: |
          ENV=${{ needs.resolve-env.outputs.environment }}
          REGISTRY=${{ steps.ecr-login.outputs.registry }}
          TAG="${GITHUB_SHA::8}"

          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "ecr_backend_url=${REGISTRY}/sampay/backend" >> "$GITHUB_OUTPUT"
          echo "ecr_frontend_url=${REGISTRY}/sampay/frontend" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.ecr_backend_url }}:${{ steps.meta.outputs.image_tag }}
          build-args: |
            MAIN_GO_FILE=./cmd/api/main.go
          platforms: linux/arm64
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.ecr_frontend_url }}:${{ steps.meta.outputs.image_tag }}
          platforms: linux/arm64
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Build and push worker
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.ecr_backend_url }}:worker-${{ steps.meta.outputs.image_tag }}
          build-args: |
            MAIN_GO_FILE=./cmd/worker/main.go
          platforms: linux/arm64
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

      - name: Build and push migration
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.migration
          push: true
          tags: ${{ steps.meta.outputs.ecr_backend_url }}:migration-${{ steps.meta.outputs.image_tag }}
          platforms: linux/arm64
          cache-from: type=gha,scope=migration
          cache-to: type=gha,mode=max,scope=migration

  deploy:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ needs.resolve-env.outputs.environment }}

    steps:
      - uses: actions/checkout@v6

      - name: Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}
          tags: tag:github-actions

      - name: Copy compose file to Raspberry Pi
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.PI_HOST }}
          username: sampay
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "compose.prod.yaml"
          target: "/app/sampay/"

      - name: Copy script files to Raspberry Pi
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.PI_HOST }}
          username: sampay
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "infra/scripts/*"
          target: "/app/sampay/scripts/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PI_HOST }}
          username: sampay
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            ENV=${{ needs.resolve-env.outputs.environment }}

            # Move compose file into place
            mv /app/sampay/compose.prod.yaml /app/sampay/compose.yaml

            # Write .env with orchestration vars
            cat > /app/sampay/.env << EOF
            APP_ENV=production
            ECR_BACKEND_URL=${{ needs.build-and-push.outputs.ecr_backend_url }}
            ECR_FRONTEND_URL=${{ needs.build-and-push.outputs.ecr_frontend_url }}
            IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
            SM_PREFIX=sampay
            SM_APP_SECRET=sampay/app
            SM_DB_SECRET=sampay/db
            SM_KVS_SECRET=sampay/kvs
            EOF

            # Login to ECR
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
              docker login --username AWS --password-stdin ${{ needs.build-and-push.outputs.ecr_backend_url }}

            # Pull new images (app + migration)
            cd /app/sampay
            docker compose pull api web worker
            docker pull ${{ needs.build-and-push.outputs.ecr_backend_url }}:migration-${{ needs.build-and-push.outputs.image_tag }}

            # Restart services (pull-secrets.sh runs via ExecStartPre)
            systemctl restart sampay || true

            # Poll for all containers to be healthy (up to 90s)
            echo "Waiting for services to be healthy..."
            for i in $(seq 1 18); do
              UNHEALTHY=$(docker compose ps --format json | jq -r 'select(.State != "running" or (.Health != null and .Health != "healthy")) | .Name' 2>/dev/null)
              if [ -z "$UNHEALTHY" ]; then
                echo "All containers are healthy"
                docker compose ps
                exit 0
              fi
              echo "Waiting... ($i/18) unhealthy: $UNHEALTHY"
              sleep 5
            done
            echo "ERROR: Containers not healthy after 90s"
            docker compose ps
            exit 1
